# @package _global_
model:
  # Can be a HuggingFace model ID or a local snapshot path.
  # In sbatch scripts, override via: model.name="$MODEL"
  name: meta-llama/Llama-3.3-70B-Instruct
  dtype: bfloat16
  max_new_tokens: 512
  temperature: 0.7
  device_map: auto
  load_in_4bit: true    # required to fit 70B on a single H100 80GB
