# @package _global_
# Phase 8 small-model replication: the provenance project's pilot model
# (qwen2.5:3b in Ollama naming), included deliberately for overlap.
model:
  name: Qwen/Qwen2.5-3B-Instruct
  dtype: bfloat16
  max_new_tokens: 512
  temperature: 0.7
  device_map: auto
  load_in_4bit: false   # fits in bf16 on one H100 80GB
